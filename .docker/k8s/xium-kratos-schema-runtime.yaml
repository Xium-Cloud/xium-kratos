  env:
    DSN: app/example-schema/xium-kratos/dsn
    COURIER_SMTP_CONNECTION_URI: app/example-schema/xium-kratos/courier_smtp_connection_uri
    SECRETS_COOKIE_0: app/example-schema/xium-kratos/secrets_cookie_0

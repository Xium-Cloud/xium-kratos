apiVersion: secrets.xium.io/v1alpha1
kind: AegisInjection
metadata:
  name: example-schema-kratos-secrets
  namespace: security
  labels:
    app.kubernetes.io/name: xium-kratos
    app.kubernetes.io/instance: example-schema-xium-kratos
    app.kubernetes.io/component: runtime-secret-injection
    xium.io/managed-by: manual
    xium.io/project-component: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: xium-kratos
      app.kubernetes.io/instance: example-schema-xium-kratos
      app.kubernetes.io/component: runtime
      xium.io/aegis-injection: example-schema-kratos-secrets
  containers:

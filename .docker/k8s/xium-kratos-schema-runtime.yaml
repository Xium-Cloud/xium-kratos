apiVersion: kms.xium.io/v1alpha1
kind: DirectInjection
metadata:
  name: example-schema-xium-kratos-runtime-postgresql-ca
  namespace: security
  labels:
    app.kubernetes.io/name: xium-kratos
    app.kubernetes.io/instance: example-schema-xium-kratos
    app.kubernetes.io/component: runtime-postgresql-ca
    xium.io/managed-by: manual
    xium.io/project-component: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: xium-kratos
      app.kubernetes.io/instance: example-schema-xium-kratos
      app.kubernetes.io/component: runtime
  containers:
    - name: kratos
  injection:
    certificates:
      - secretRef: postgresql-tls
        mountPath: /var/xium.dev/certs/postgresql-ca.crt
        mode: "0444"
---
